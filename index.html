<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.6s ease;
}

/* 🌈 backgrounds */
.sun { background: radial-gradient(circle at top, #4facfe, #00f2fe); }
.cloud { background: radial-gradient(circle at top, #5f6c7b, #1c2541); }
.rain { background: radial-gradient(circle at top, #2b5876, #1b1f3b); }
.snow { background: radial-gradient(circle at top, #e0eafc, #cfdef3); }

/* container */
.container {
  width: 100%;
  max-width: 750px;
  text-align: center;
  padding: 20px;
}

/* title */
.title {
  font-size: 52px;
  font-weight: 200;
  margin-bottom: 25px;
  letter-spacing: 2px;
}

/* search */
.search {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 25px;
}

input {
  width: 60%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  text-align: center;
  outline: none;
}

button {
  padding: 14px 18px;
  border-radius: 30px;
  border: none;
  background: #ffffff;
  color: black;
  cursor: pointer;
}

/* glass cards */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border-radius: 24px;
  padding: 20px;
  margin-top: 18px;
  animation: fade 0.4s ease;
}

@keyframes fade {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* temp */
.temp {
  font-size: 78px;
  font-weight: 200;
}

/* hourly */
.hourly {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px 0;
}

.hour {
  min-width: 75px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px;
}

/* forecast */
.day {
  display: grid;
  grid-template-columns: 50px 1fr 90px;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  text-align: left;
}

.icon {
  font-size: 22px;
  text-align: center;
}

</style>
</head>

<body class="sun">

<div class="container">

  <div class="title">Weather</div>

  <div class="search">
    <input id="cityInput" placeholder="Search city">
    <button onclick="getWeather()">Search</button>
  </div>

  <div id="app"></div>

</div>

<script>

const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"❄️",80:"🌧️",95:"⛈️"
};

function bg(code){
  if(code === 0) return "sun";
  if(code <= 3) return "cloud";
  if(code >= 61) return "rain";
  return "cloud";
}

function windDir(deg){
  const d=["N","NE","E","SE","S","SW","W","NW"];
  return d[Math.round(deg/45)%8];
}

function dayName(date){
  return new Date(date).toLocaleDateString("en-US",{weekday:"short"});
}

async function getWeather(){

  const city = document.getElementById("cityInput").value;
  const app = document.getElementById("app");

  app.innerHTML = "Loading...";

  const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
  const g = await geo.json();

  if(!g.results){
    app.innerHTML = "City not found";
    return;
  }

  const {latitude, longitude, name} = g.results[0];

  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`+
    `&current_weather=true&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`
  );

  const data = await res.json();

  const c = data.current_weather;
  const d = data.daily;
  const h = data.hourly;

  document.body.className = bg(c.weathercode);

  let hourlyHTML = "";
  for(let i=0;i<12;i++){
    hourlyHTML += `
      <div class="hour">
        <div>${h.time[i].slice(11,16)}</div>
        <div>${h.temperature_2m[i]}°</div>
      </div>
    `;
  }

  let daysHTML = "";
  for(let i=0;i<7;i++){
    daysHTML += `
      <div class="day">
        <div class="icon">${icons[d.weathercode[i]]||"🌥️"}</div>
        <div>${dayName(d.time[i])}</div>
        <div>${d.temperature_2m_min[i]}° / ${d.temperature_2m_max[i]}°</div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <div class="temp">${c.temperature}°</div>
      <div>${name}</div>
      <div>Wind: ${c.windspeed} m/s (${windDir(c.winddirection)})</div>
    </div>

    <div class="card">
      <h3>Hourly</h3>
      <div class="hourly">${hourlyHTML}</div>
    </div>

    <div class="card">
      <h3>7-Day Forecast</h3>
      ${daysHTML}
    </div>
  `;
}

document.getElementById("cityInput")
.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") getWeather();
});

</script>

</body>
</html>
