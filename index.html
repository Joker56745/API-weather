<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather PRO</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  transition: 0.5s;
  min-height: 100vh;
}

/* 🌄 dynamic background */
.sun { background: linear-gradient(#4facfe, #00f2fe); }
.cloud { background: linear-gradient(#757f9a, #d7dde8); }
.rain { background: linear-gradient(#3a6073, #16222a); }
.snow { background: linear-gradient(#e6dada, #274046); }

/* layout */
.container {
  padding: 20px;
  max-width: 900px;
  margin: auto;
}

/* glass */
.card {
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
}

/* input */
input {
  padding: 12px;
  width: 65%;
  border-radius: 30px;
  border: none;
}

button {
  padding: 12px 18px;
  border-radius: 30px;
  border: none;
  background: #fff;
  color: black;
  cursor: pointer;
}

/* temp */
.temp {
  font-size: 70px;
  font-weight: 200;
}

/* hourly scroll */
.hourly {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  margin-top: 10px;
}

.hour {
  min-width: 70px;
  text-align: center;
}

/* forecast list */
.day {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}

/* animation */
.fade {
  animation: fade 0.4s ease;
}

@keyframes fade {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}
</style>
</head>

<body class="sun">

<div class="container">

<h2>Weather PRO</h2>

<input id="cityInput" placeholder="Введите город">
<button onclick="getWeather()">Search</button>

<div id="app"></div>

</div>

<script>

const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"❄️",80:"🌧️",95:"⛈️"
};

function bgByWeather(code){
  if(code === 0) return "sun";
  if(code <= 3) return "cloud";
  if(code >= 61) return "rain";
  if(code >= 71) return "snow";
  return "cloud";
}

function windDir(deg){
  const d=["N","NE","E","SE","S","SW","W","NW"];
  return d[Math.round(deg/45)%8];
}

async function getWeather(){

  const city = document.getElementById("cityInput").value;
  const app = document.getElementById("app");

  app.innerHTML = "Loading...";

  const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
  const g = await geo.json();

  if(!g.results){
    app.innerHTML = "City not found";
    return;
  }

  const {latitude, longitude, name} = g.results[0];

  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`+
    `&current_weather=true&hourly=temperature_2m`+
    `&daily=weathercode,temperature_2m_max,temperature_2m_min`+
    `&timezone=auto`
  );

  const data = await res.json();

  const c = data.current_weather;
  const d = data.daily;
  const h = data.hourly;

  document.body.className = bgByWeather(c.weathercode);

  /* hourly */
  let hourlyHTML = "";
  for(let i=0;i<12;i++){
    hourlyHTML += `
      <div class="hour">
        <div>${h.time[i].slice(11,16)}</div>
        <div>${h.temperature_2m[i]}°</div>
      </div>
    `;
  }

  /* forecast */
  let daysHTML = "";
  for(let i=0;i<7;i++){
    daysHTML += `
      <div class="day">
        <div>${new Date(d.time[i]).toLocaleDateString("ru",{weekday:"short"})}</div>
        <div>${icons[d.weathercode[i]]||"🌥️"}</div>
        <div>${d.temperature_2m_min[i]}° / ${d.temperature_2m_max[i]}°</div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card fade">

      <h2>${name}</h2>

      <div class="temp">${c.temperature}°</div>

      <div>Ветер: ${c.windspeed} м/с (${windDir(c.winddirection)})</div>

    </div>

    <div class="card fade">
      <h3>Почасовой прогноз</h3>
      <div class="hourly">${hourlyHTML}</div>
    </div>

    <div class="card fade">
      <h3>7 дней</h3>
      ${daysHTML}
    </div>
  `;
}

document.getElementById("cityInput")
.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") getWeather();
});

</script>

</body>
</html>
