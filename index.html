<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Погода</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 800px; margin: 40px auto; }
    input {
      padding: 14px;
      width: 280px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      outline: none;
    }
    button {
      padding: 14px 24px;
      font-size: 18px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
    .weather-icon { font-size: 70px; margin: 10px 0; }
    .forecast {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 25px;
    }
    .day {
      background: rgba(255,255,255,0.15);
      padding: 12px 10px;
      border-radius: 12px;
      width: 100px;
      text-align: center;
    }
    .day-name { font-size: 15px; margin-bottom: 8px; }
  </style>
</head>
<body>

<div class="container">
  <h1>☀️ Погода</h1>
  <input id="cityInput" placeholder="Введите город" type="text">
  <button onclick="getWeather()">Показать погоду</button>
  
  <div id="result"></div>
</div>

<script>
// Иконки погоды
const weatherIcons = {
  0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
  45: "🌫️", 48: "🌫️",
  51: "🌧️", 53: "🌧️", 55: "🌧️",
  61: "🌦️", 63: "🌧️", 65: "🌧️",
  71: "❄️", 73: "❄️", 75: "❄️",
  80: "🌦️", 81: "🌧️", 82: "⛈️",
  95: "⛈️", 96: "⛈️", 99: "⛈️"
};

async function getWeather() {
  const cityInput = document.getElementById("cityInput");
  const result = document.getElementById("result");
  
  let city = cityInput.value.trim();
  if (!city) {
    result.innerHTML = "<p style='color: #ff6b6b;'>Введите название города</p>";
    return;
  }

  result.innerHTML = "<p>Загрузка...</p>";

  try {
    // Геокодирование
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const geoData = await geoRes.json();

    if (!geoData.results || geoData.results.length === 0) {
      result.innerHTML = `<p style='color: #ff6b6b;'>Город "${city}" не найден</p>`;
      return;
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    // Запрос текущей погоды + прогноз на 7 дней
    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?` +
      `latitude=${latitude}&longitude=${longitude}` +
      `&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min` +
      `&wind_speed_unit=ms&timezone=auto`
    );
    const data = await weatherRes.json();

    const current = data.current_weather;
    const daily = data.daily;

    const currentIcon = weatherIcons[current.weathercode] || "🌥️";

    let forecastHTML = `<div class="forecast">`;
    for (let i = 0; i < 7; i++) {
      const date = new Date(daily.time[i]);
      const dayName = date.toLocaleDateString('ru-RU', { weekday: 'short' });
      const icon = weatherIcons[daily.weathercode[i]] || "🌥️";

      forecastHTML += `
        <div class="day">
          <div class="day-name">${dayName}</div>
          <div style="font-size:40px">${icon}</div>
          <div><strong>${daily.temperature_2m_max[i]}°</strong></div>
          <div style="opacity:0.7">${daily.temperature_2m_min[i]}°</div>
        </div>
      `;
    }
    forecastHTML += `</div>`;

    result.innerHTML = `
      <h2>${name}, ${country || ''}</h2>
      <div class="weather-icon">${currentIcon}</div>
      <h1 style="font-size: 52px; margin: 5px 0;">${current.temperature}°C</h1>
      <p><strong>${weatherIcons[current.weathercode] ? '' : 'Облачно'}</strong></p>
      
      <p><strong>Ветер:</strong> ${current.windspeed} м/с</p>
      
      <h3 style="margin: 25px 0 15px;">Прогноз на 7 дней</h3>
      ${forecastHTML}
      
      <small>Обновлено: ${new Date().toLocaleTimeString('ru-RU')}</small>
    `;

  } catch (error) {
    result.innerHTML = "<p style='color: #ff6b6b;'>Ошибка загрузки данных</p>";
    console.error(error);
  }
}

// Поиск по Enter
document.getElementById("cityInput").addEventListener("keypress", e => {
  if (e.key === "Enter") getWeather();
});
</script>

</body>
</html>
