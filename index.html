<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Weather</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1b2a4a, #0b1020);
  overflow-x: hidden;
}

/* 🌫 glass card */
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 24px;
  padding: 20px;
}

/* layout */
.container {
  max-width: 900px;
  margin: auto;
  padding: 30px;
}

/* input */
input {
  width: 70%;
  padding: 14px;
  border-radius: 50px;
  border: none;
  outline: none;
  font-size: 16px;
}

button {
  padding: 14px 20px;
  border-radius: 50px;
  border: none;
  background: #4f8cff;
  color: white;
  cursor: pointer;
}

/* main temp */
.big-temp {
  font-size: 72px;
  font-weight: 200;
}

/* city */
.city {
  font-size: 26px;
  opacity: 0.9;
}

/* wind row */
.row {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
  opacity: 0.85;
}

/* forecast Apple-style list */
.forecast {
  margin-top: 25px;
}

.day {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}

.day:last-child {
  border-bottom: none;
}

.left {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* icon */
.icon {
  font-size: 22px;
}

/* fade animation */
.fade {
  animation: fade 0.5s ease;
}

@keyframes fade {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="container">

  <h2>🌤 Weather</h2>

  <input id="cityInput" placeholder="Введите город">
  <button onclick="getWeather()">Поиск</button>

  <div id="result" style="margin-top:20px;"></div>

</div>

<script>

const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  45:"🌫️",48:"🌫️",
  51:"🌧️",61:"🌦️",63:"🌧️",65:"🌧️",
  71:"❄️",80:"🌦️",81:"🌧️",95:"⛈️"
};

function windDir(deg){
  const d=["N","NE","E","SE","S","SW","W","NW"];
  return d[Math.round(deg/45)%8];
}

async function getWeather(){

  const city = document.getElementById("cityInput").value;
  const result = document.getElementById("result");

  result.innerHTML = "Loading...";

  const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
  const g = await geo.json();

  if(!g.results){
    result.innerHTML = "Not found";
    return;
  }

  const {latitude, longitude, name, country} = g.results[0];

  const w = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`+
    `&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min`+
    `&timezone=auto`
  );

  const data = await w.json();

  const c = data.current_weather;
  const d = data.daily;

  let forecast="";

  for(let i=0;i<7;i++){
    forecast += `
      <div class="day">
        <div class="left">
          <div class="icon">${icons[d.weathercode[i]]||"🌥️"}</div>
          <div>${new Date(d.time[i]).toLocaleDateString("ru",{weekday:"short"})}</div>
        </div>
        <div>
          ${d.temperature_2m_min[i]}° / ${d.temperature_2m_max[i]}°
        </div>
      </div>
    `;
  }

  result.innerHTML = `
    <div class="glass fade">

      <div class="city">${name}, ${country}</div>

      <div class="big-temp">${c.temperature}°</div>

      <div class="row">
        <div>Ветер: ${c.windspeed} м/с</div>
        <div>${windDir(c.winddirection)}</div>
      </div>

    </div>

    <div class="glass forecast fade">
      ${forecast}
    </div>
  `;
}

document.getElementById("cityInput")
.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") getWeather();
});

</script>

</body>
</html>
