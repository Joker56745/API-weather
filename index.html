<script>
async function getWeather() {
  let city = document.getElementById("cityInput").value;

  if (!city) return;

  try {
    let geoResponse = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + city);
    let geoData = await geoResponse.json();

    if (!geoData.results) {
      document.getElementById("result").innerText = "Город не найден";
      return;
    }

    let lat = geoData.results[0].latitude;
    let lon = geoData.results[0].longitude;

    let weatherResponse = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
    );

    let weatherData = await weatherResponse.json();

    document.getElementById("result").innerText =
      "Температура: " + weatherData.current_weather.temperature + "°C";

  } catch (error) {
    document.getElementById("result").innerText = "Ошибка загрузки";
  }
}
</script>
