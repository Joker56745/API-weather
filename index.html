<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1b2a4a, #0b1020);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* центрированный контейнер */
.container {
  width: 100%;
  max-width: 700px;
  text-align: center;
  padding: 20px;
}

/* WEATHER title */
.title {
  font-size: 48px;
  font-weight: 200;
  letter-spacing: 2px;
  margin-bottom: 30px;
  opacity: 0.9;
}

/* search */
.search-box {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 25px;
}

input {
  width: 60%;
  padding: 14px;
  border-radius: 30px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 16px;
}

button {
  padding: 14px 18px;
  border-radius: 30px;
  border: none;
  background: #4f8cff;
  color: white;
  cursor: pointer;
}

/* glass card */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 22px;
  padding: 20px;
  margin-top: 20px;
}

/* main temp */
.temp {
  font-size: 72px;
  font-weight: 200;
}

/* hourly */
.hourly {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px 0;
  justify-content: flex-start;
}

.hour {
  min-width: 70px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 10px;
}

/* forecast FIX (ровные колонки) */
.day {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.icon {
  font-size: 22px;
  text-align: center;
}

</style>
</head>

<body>

<div class="container">

  <div class="title">Weather</div>

  <div class="search-box">
    <input id="cityInput" placeholder="Search city">
    <button onclick="getWeather()">Go</button>
  </div>

  <div id="app"></div>

</div>

<script>

const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"❄️",80:"🌧️",95:"⛈️"
};

function windDir(deg){
  const d=["N","NE","E","SE","S","SW","W","NW"];
  return d[Math.round(deg/45)%8];
}

async function getWeather(){

  const city = document.getElementById("cityInput").value;
  const app = document.getElementById("app");

  app.innerHTML = "Loading...";

  const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
  const g = await geo.json();

  if(!g.results){
    app.innerHTML = "City not found";
    return;
  }

  const {latitude, longitude, name} = g.results[0];

  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`+
    `&current_weather=true&hourly=temperature_2m`+
    `&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`
  );

  const data = await res.json();

  const c = data.current_weather;
  const d = data.daily;
  const h = data.hourly;

  /* hourly */
  let hourlyHTML = "";
  for(let i=0;i<12;i++){
    hourlyHTML += `
      <div class="hour">
        <div>${h.time[i].slice(11,16)}</div>
        <div>${h.temperature_2m[i]}°</div>
      </div>
    `;
  }

  /* forecast */
  let daysHTML = "";
  for(let i=0;i<7;i++){
    daysHTML += `
      <div class="day">
        <div class="icon">${icons[d.weathercode[i]]||"🌥️"}</div>
        <div>${new Date(d.time[i]).toLocaleDateString("ru",{weekday:"short"})}</div>
        <div>${d.temperature_2m_min[i]}° / ${d.temperature_2m_max[i]}°</div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <div class="temp">${c.temperature}°</div>
      <div>${name}</div>
      <div>Wind: ${c.windspeed} m/s (${windDir(c.winddirection)})</div>
    </div>

    <div class="card">
      <h3>Hourly</h3>
      <div class="hourly">${hourlyHTML}</div>
    </div>

    <div class="card">
      <h3>7 days</h3>
      ${daysHTML}
    </div>
  `;
}

document.getElementById("cityInput")
.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") getWeather();
});

</script>

</body>
</html>
