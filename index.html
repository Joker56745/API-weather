<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>

<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  color: white;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1b2a4a, #0b1020);
}

/* layout */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

/* input */
input {
  padding: 12px;
  width: 65%;
  border-radius: 30px;
  border: none;
  outline: none;
}

button {
  padding: 12px 18px;
  border-radius: 30px;
  border: none;
  background: #4f8cff;
  color: white;
  cursor: pointer;
}

/* glass */
.card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  margin-top: 20px;
}

/* main temp */
.temp {
  font-size: 70px;
  font-weight: 200;
}

/* ===== HOURLY FIX ===== */
.hourly {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding-bottom: 8px;
}

.hourly::-webkit-scrollbar {
  height: 6px;
}

.hourly::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}

.hour {
  min-width: 70px;
  flex-shrink: 0;
  text-align: center;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 14px;
}

/* ===== FORECAST FIX (VERTICAL ALIGNMENT) ===== */
.day {
  display: grid;
  grid-template-columns: 40px 1fr auto;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,255,255,0.15);
}

.day:last-child {
  border-bottom: none;
}

.icon {
  font-size: 22px;
  text-align: center;
}

/* header spacing */
h2, h3 {
  margin: 10px 0;
}

</style>
</head>

<body>

<div class="container">

<h2>Weather</h2>

<input id="cityInput" placeholder="Введите город">
<button onclick="getWeather()">Search</button>

<div id="app"></div>

</div>

<script>

const icons = {
  0:"☀️",1:"🌤️",2:"⛅",3:"☁️",
  61:"🌧️",63:"🌧️",65:"🌧️",
  71:"❄️",80:"🌧️",95:"⛈️"
};

function windDir(deg){
  const d=["N","NE","E","SE","S","SW","W","NW"];
  return d[Math.round(deg/45)%8];
}

async function getWeather(){

  const city = document.getElementById("cityInput").value;
  const app = document.getElementById("app");

  app.innerHTML = "Loading...";

  const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`);
  const g = await geo.json();

  if(!g.results){
    app.innerHTML = "City not found";
    return;
  }

  const {latitude, longitude, name} = g.results[0];

  const res = await fetch(
    `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}`+
    `&current_weather=true&hourly=temperature_2m&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`
  );

  const data = await res.json();

  const c = data.current_weather;
  const d = data.daily;
  const h = data.hourly;

  /* hourly */
  let hourlyHTML = "";
  for(let i=0;i<12;i++){
    hourlyHTML += `
      <div class="hour">
        <div>${h.time[i].slice(11,16)}</div>
        <div>${h.temperature_2m[i]}°</div>
      </div>
    `;
  }

  /* forecast */
  let daysHTML = "";
  for(let i=0;i<7;i++){
    daysHTML += `
      <div class="day">
        <div class="icon">${icons[d.weathercode[i]]||"🌥️"}</div>
        <div>${new Date(d.time[i]).toLocaleDateString("ru",{weekday:"short"})}</div>
        <div>${d.temperature_2m_min[i]}° / ${d.temperature_2m_max[i]}°</div>
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <h3>${name}</h3>
      <div class="temp">${c.temperature}°</div>
      <div>Ветер: ${c.windspeed} м/с (${windDir(c.winddirection)})</div>
    </div>

    <div class="card">
      <h3>Hourly</h3>
      <div class="hourly">${hourlyHTML}</div>
    </div>

    <div class="card">
      <h3>7 Days</h3>
      ${daysHTML}
    </div>
  `;
}

document.getElementById("cityInput")
.addEventListener("keypress",(e)=>{
  if(e.key==="Enter") getWeather();
});

</script>

</body>
</html>
