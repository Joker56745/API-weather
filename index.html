<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Погода</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: 40px auto; }
    input {
      padding: 14px;
      width: 280px;
      font-size: 18px;
      border: none;
      border-radius: 50px;
      outline: none;
    }
    button {
      padding: 14px 24px;
      font-size: 18px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }
    #result {
      margin-top: 30px;
      font-size: 22px;
      background: rgba(255,255,255,0.1);
      padding: 25px;
      border-radius: 16px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>

<div class="container">
  <h1>☀️ Погода сейчас</h1>
  <input id="cityInput" placeholder="Введите город" type="text">
  <button onclick="getWeather()">Показать погоду</button>
  
  <div id="result"></div>
</div>

<script>
async function getWeather() {
  const cityInput = document.getElementById("cityInput");
  const result = document.getElementById("result");
  
  let city = cityInput.value.trim();
  if (!city) {
    result.innerHTML = "<p style='color: #ff6b6b;'>Введите название города</p>";
    return;
  }

  result.innerHTML = "<p>Загрузка...</p>";

  try {
    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
    const geoData = await geoRes.json();

    if (!geoData.results || geoData.results.length === 0) {
      result.innerHTML = `<p style='color: #ff6b6b;'>Город "${city}" не найден</p>`;
      return;
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    // Важно: wind_speed_unit=ms
    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&wind_speed_unit=ms&timezone=auto`
    );
    const weatherData = await weatherRes.json();

    const w = weatherData.current_weather;

    const directions = ["С", "СВ", "В", "ЮВ", "Ю", "ЮЗ", "З", "СЗ"];
    const windDirText = directions[Math.round(w.winddirection / 45) % 8];

    result.innerHTML = `
      <h2>${name}, ${country || ''}</h2>
      <h1 style="font-size: 52px; margin: 10px 0;">${w.temperature}°C</h1>
      
      <p><strong>Ощущается как:</strong> ${w.temperature}°C</p>
      <p><strong>Ветер:</strong> ${w.windspeed} м/с ${windDirText} (${w.winddirection}°)</p>
      
      <small>Обновлено: ${new Date().toLocaleTimeString('ru-RU')}</small>
    `;

  } catch (error) {
    result.innerHTML = "<p style='color: #ff6b6b;'>Ошибка соединения</p>";
    console.error(error);
  }
}

// Enter
document.getElementById("cityInput").addEventListener("keypress", e => {
  if (e.key === "Enter") getWeather();
});
</script>

</body>
</html>
